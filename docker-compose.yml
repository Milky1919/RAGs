services:

  # ── Qdrant ベクターDB ───────────────────────────────────────────────────
  # 【ローカル開発注意】
  # 既に別スタック（Dify等）がポート 6333/6334 を使用している場合は
  # このサービスをコメントアウトし、既存の Qdrant を共用すること。
  # その場合は rag-service の QDRANT_HOST を "localhost" に変更する。
  qdrant:
    image: qdrant/qdrant:latest
    container_name: novel_rag_qdrant
    restart: unless-stopped
    ports:
      - "6335:6333"   # REST API / Web UI（ローカルは 6335 で競合回避）
      - "6336:6334"   # gRPC（ローカルは 6336 で競合回避）
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO

  # ── RAG サービス（MCP + Webhook + Web UI を一括管理） ──────────────────
  rag-service:
    build: .
    container_name: novel_rag_service
    restart: unless-stopped
    # Docker Desktop（Windows/Mac）: host.docker.internal は自動解決されるため extra_hosts 不要
    # Linux 本番サーバー（Dockge）: 以下のコメントを解除すること
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8765:8765"   # MCP サーバー（HTTP/SSE）
      - "8766:8766"   # Webhook 受信 API
      - "8767:8767"   # Streamlit Web UI
    volumes:
      - ./rag_data:/app/rag_data        # 原稿・設定ファイル置き場
      - ./repo:/app/repo                # git clone した原稿リポジトリ
    environment:
      - OLLAMA_HOST=http://100.119.108.16:11434
      - QDRANT_HOST=novel_rag_qdrant    # 同スタックの Qdrant コンテナ名
      - QDRANT_PORT=6333
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    depends_on:
      - qdrant
